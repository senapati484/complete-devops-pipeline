name: CI — Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't crash on missing env vars
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/devops_dashboard"
          JWT_SECRET: "ci-build-secret-do-not-use"
          NEXTAUTH_SECRET: "ci-nextauth-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          NODE_ENV: "production"
